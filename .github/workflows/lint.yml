name: Lint

on:
  # Run on every push/PR to main. No paths: filter — these checks are required
  # by branch protection, and a path-filtered workflow never reports a status for
  # PRs that miss the filter (e.g. docs-only), which deadlocks the merge.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning
          ignore_paths: dotfiles/shell
          # recprompt.sh is zsh-only (shellcheck has no zsh mode); linted via zsh -n.
          ignore_names: recprompt.sh
        env:
          SHELLCHECK_OPTS: --shell=bash --exclude=SC1090,SC1091

  zsh-syntax:
    name: Zsh Syntax Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check .zshrc syntax
        run: zsh -n dotfiles/shell/.zshrc

      - name: Check .zprofile syntax
        run: zsh -n dotfiles/shell/.zprofile

      - name: Check zsh-only function files syntax
        run: zsh -n shell/functions/recprompt.sh

  bats-tests:
    name: Bats Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats
        run: brew install bats-core

      - name: Run tests
        run: bats tests/
